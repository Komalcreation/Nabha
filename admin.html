<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Komal Creation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background: #f5f5f5; }
  
  .login-container {
    max-width: 400px;
    margin: 100px auto;
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.1);
  }
  .login-container h2 { text-align: center; color: #b8336a; margin-bottom: 30px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
  .form-group input {
    width: 100%;
    padding: 12px;
    border: 2px solid #eee;
    border-radius: 8px;
    font-size: 1rem;
  }
  .btn {
    width: 100%;
    background: #b8336a;
    color: white;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
  }
  .btn:hover { background: #9a2a58; }
  
  .admin-panel { display: none; }
  .admin-panel.active { display: block; }
  
  .header {
    background: linear-gradient(135deg, #b8336a 0%, #e91e63 100%);
    color: white;
    padding: 20px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-size: 1.5rem; }
  .logout-btn {
    background: white;
    color: #b8336a;
    padding: 8px 20px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
  }
  
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 30px 5%;
  }
  .stat-card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 3px 15px rgba(0,0,0,0.08);
    text-align: center;
  }
  .stat-card h3 { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
  .stat-card .number { font-size: 2.5rem; font-weight: bold; color: #b8336a; }
  
  .content { padding: 0 5% 30px; }
  .table-container {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 3px 15px rgba(0,0,0,0.08);
  }
  .table-header {
    padding: 20px;
    background: #f8f8f8;
    border-bottom: 2px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .table-header h2 { color: #333; }
  .search-box {
    padding: 10px 15px;
    border: 2px solid #eee;
    border-radius: 8px;
    width: 300px;
  }
  
  table { width: 100%; border-collapse: collapse; }
  th {
    background: #b8336a;
    color: white;
    padding: 15px;
    text-align: left;
    font-weight: 600;
  }
  td { padding: 15px; border-bottom: 1px solid #eee; }
  tr:hover { background: #f9f9f9; }
  
  .status {
    padding: 5px 12px;
    border-radius: 15px;
    font-size: 0.85rem;
    font-weight: bold;
  }
  .status.enrolled { background: #d4edda; color: #155724; }
  .status.completed { background: #cce5ff; color: #004085; }
  
  .action-btn {
    padding: 6px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.85rem;
    margin-right: 5px;
  }
  .view-btn { background: #17a2b8; color: white; }
  .delete-btn { background: #dc3545; color: white; }
  
  @media (max-width: 768px) {
    .search-box { width: 100%; margin-top: 10px; }
    .table-container { overflow-x: auto; }
    table { min-width: 800px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="loginContainer">
  <h2>🔐 Admin Login</h2>
  <form onsubmit="login(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>
    <button type="submit" class="btn">Login</button>
  </form>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
  <div class="header">
    <h1>✂️ Admin Panel - Komal Creation</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <h3>Total Students</h3>
      <div class="number" id="totalStudents">0</div>
    </div>
    <div class="stat-card">
      <h3>Active Enrollments</h3>
      <div class="number" id="activeEnrollments">0</div>
    </div>
    <div class="stat-card">
      <h3>This Month</h3>
      <div class="number" id="thisMonth">0</div>
    </div>
  </div>

  <div class="content">
    <div class="table-container">
      <div class="table-header">
        <h2>Student Records</h2>
        <input type="text" class="search-box" placeholder="Search students..." onkeyup="searchStudents(this.value)">
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Course</th>
            <th>Batch</th>
            <th>Enrolled On</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDH2QjU1-Aho2QKj-qC0Z4MjVvtPmXELdI",
    authDomain: "komal-training-center.firebaseapp.com",
    projectId: "komal-training-center",
    storageBucket: "komal-training-center.firebasestorage.app",
    messagingSenderId: "974017571582",
    appId: "1:974017571582:web:24e78611e2e7afe93113af",
    measurementId: "G-7ZLH4R30GP"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  // Admin credentials (Change these!)
  const ADMIN_USERNAME = "komal";
  const ADMIN_PASSWORD = "komal2026";

  let allStudents = [];

  function login(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      sessionStorage.setItem('adminLoggedIn', 'true');
      showAdminPanel();
    } else {
      alert('Invalid credentials!');
    }
  }

  function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    document.getElementById('loginContainer').style.display = 'block';
    document.getElementById('adminPanel').classList.remove('active');
  }

  function showAdminPanel() {
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('adminPanel').classList.add('active');
    loadStudents();
  }

  async function loadStudents() {
    const snapshot = await db.collection('students').orderBy('enrolledOn', 'desc').get();
    allStudents = [];
    const tbody = document.getElementById('studentsTable');
    tbody.innerHTML = '';

    const thisMonthCount = snapshot.docs.filter(doc => {
      const date = new Date(doc.data().enrolledOn);
      const now = new Date();
      return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
    }).length;

    document.getElementById('totalStudents').textContent = snapshot.size;
    document.getElementById('thisMonth').textContent = thisMonthCount;
    document.getElementById('activeEnrollments').textContent = snapshot.docs.filter(doc => doc.data().status === 'Enrolled').length;

    snapshot.forEach(doc => {
      const student = doc.data();
      allStudents.push(student);
      
      tbody.innerHTML += `
        <tr>
          <td>${student.id}</td>
          <td>${student.name}</td>
          <td>${student.phone}</td>
          <td>${student.course.split(' - ')[0]}</td>
          <td>${student.batch}</td>
          <td>${student.enrolledOn}</td>
          <td><span class="status ${student.status.toLowerCase()}">${student.status}</span></td>
          <td>
            <button class="action-btn view-btn" onclick="viewStudent('${student.id}')">View</button>
            <button class="action-btn delete-btn" onclick="deleteStudent('${student.id}')">Delete</button>
          </td>
        </tr>
      `;
    });
  }

  function searchStudents(query) {
    const tbody = document.getElementById('studentsTable');
    tbody.innerHTML = '';
    
    const filtered = allStudents.filter(s => 
      s.name.toLowerCase().includes(query.toLowerCase()) ||
      s.id.toLowerCase().includes(query.toLowerCase()) ||
      s.phone.includes(query)
    );

    filtered.forEach(student => {
      tbody.innerHTML += `
        <tr>
          <td>${student.id}</td>
          <td>${student.name}</td>
          <td>${student.phone}</td>
          <td>${student.course.split(' - ')[0]}</td>
          <td>${student.batch}</td>
          <td>${student.enrolledOn}</td>
          <td><span class="status ${student.status.toLowerCase()}">${student.status}</span></td>
          <td>
            <button class="action-btn view-btn" onclick="viewStudent('${student.id}')">View</button>
            <button class="action-btn delete-btn" onclick="deleteStudent('${student.id}')">Delete</button>
          </td>
        </tr>
      `;
    });
  }

  function viewStudent(id) {
    const student = allStudents.find(s => s.id === id);
    alert(`
Student Details:
ID: ${student.id}
Name: ${student.name}
Phone: ${student.phone}
Email: ${student.email}
Age: ${student.age}
Gender: ${student.gender}
Address: ${student.address}
Course: ${student.course}
Batch: ${student.batch}
Experience: ${student.experience}
Enrolled On: ${student.enrolledOn}
Status: ${student.status}
    `);
  }

  async function deleteStudent(id) {
    if (confirm('Are you sure you want to delete this student record?')) {
      await db.collection('students').doc(id).delete();
      loadStudents();
    }
  }

  // Check if already logged in
  if (sessionStorage.getItem('adminLoggedIn') === 'true') {
    showAdminPanel();
  }
</script>

</body>
</html>
